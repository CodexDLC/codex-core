site_name: codex-core
site_description: Core utilities, schemas and settings for Codex WaaS toolkit
site_author: Codex Team

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.breadcrumbs
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

extra:
  version:
    provider: mike
    default: latest

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - include-markdown
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_category_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            docstring_style: google
            members_order: source

nav:
  - Home: index.md
  - Guide (EN):
      - Overview: en/README.md
      - Tasks:
          - Getting Started: en/tasks/getting_started.md
      - Architecture:
          - Overview: en/architecture/README.md
          - Core (PII & DTO): en/architecture/platform/core.md
          - Common (Utils): en/architecture/platform/common.md
          - Settings (Config): en/architecture/platform/settings.md
          - Dev Tools: en/architecture/platform/dev.md
  - Руководство (RU):
      - Обзор: ru/README.md
      - Задачи (Tasks):
          - Начало работы: ru/tasks/getting_started.md
      - Архитектура:
          - Обзор: ru/architecture/README.md
          - Core (PII и DTO): ru/architecture/platform/core.md
          - Common (Утилиты): ru/architecture/platform/common.md
          - Settings (Настройки): ru/architecture/platform/settings.md
          - Dev Tools: ru/architecture/platform/dev.md
  - API Reference:
      - Overview: en/api/index.md
      - Core (DTO & PII): en/api/core.md
      - Common (Utilities): en/api/common.md
      - Settings (Base): en/api/settings.md
      - Dev Tools: en/api/dev.md
  - Changelog: changelog.md
  - Roadmap: evolution/roadmap.md
