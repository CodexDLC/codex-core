site_name: codex-core
site_description: Core utilities, schemas and settings for Codex WaaS toolkit
site_author: Codex Team

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

extra:
  version:
    provider: mike
    default: latest

plugins:
  - search
  - include-markdown
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_category_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            docstring_style: google

nav:
  - Home: index.md
  - Guide (EN):
      - Overview: en_EN/README.md
      - Getting Started: en_EN/guide/getting_started.md
      - Architecture: en_EN/architecture/README.md
      - Platform (Architecture):
          - Core (PII & DTO): en_EN/architecture/platform/core.md
          - Common (Utils): en_EN/architecture/platform/common.md
          - Settings (Config): en_EN/architecture/platform/settings.md
      - Evolution:
          - Roadmap: evolution/roadmap.md
  - Руководство (RU):
      - Обзор: ru_RU/README.md
      - Начало работы: ru_RU/guide/getting_started.md
      - Обзор архитектуры: ru_RU/architecture/README.md
      - Платформа (Архитектура):
          - Core (PII и DTO): ru_RU/architecture/platform/core.md
          - Common (Утилиты): ru_RU/architecture/platform/common.md
          - Settings (Настройки): ru_RU/architecture/platform/settings.md
  - API Reference:
      - Overview: api/index.md
      - Core (DTO & PII): api/core.md
      - Common (Utilities): api/common.md
      - Settings (Base): api/settings.md
  - Changelog: changelog.md
